{{define "content"}}
<div class="p-8">
    <h2 class="text-2xl font-bold mb-6">Dashboard Scope: {{.Scope}}</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-slate-900 border border-slate-800 rounded-lg p-6 shadow-sm">
            <h3 class="text-slate-400 text-sm font-medium">Total Tasks</h3>
            <p class="text-4xl font-light text-white mt-2">{{.TotalTasks}}</p>
            <a href="/web/tasks" class="text-emerald-400 text-xs mt-4 inline-block hover:underline">View queue
                &rarr;</a>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-lg p-6 shadow-sm">
            <h3 class="text-slate-400 text-sm font-medium">Execution Runs</h3>
            <p class="text-4xl font-light text-white mt-2">{{.TotalRuns}}</p>
            <a href="/web/runs" class="text-emerald-400 text-xs mt-4 inline-block hover:underline">View runs &rarr;</a>
        </div>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-lg p-6 shadow-sm">
        <h3 class="text-lg font-medium mb-4">Quick Actions</h3>
        <p class="text-sm text-slate-400 mb-6">Execute context-free system commands directly on this scope.</p>

        <div class="space-y-4">
            <button
                class="bg-slate-800 hover:bg-slate-700 border border-slate-700 px-4 py-2 rounded text-sm transition-colors text-left flex justify-between items-center w-full md:w-1/2">
                <span>Trigger DMN Reflection</span>
                <span class="text-xs bg-slate-900 px-2 py-1 rounded text-slate-400">Not Implemented</span>
            </button>
            <button
                class="bg-slate-800 hover:bg-slate-700 border border-slate-700 px-4 py-2 rounded text-sm transition-colors text-left flex justify-between items-center w-full md:w-1/2">
                <span>Run Memory Reaper</span>
                <span class="text-xs bg-slate-900 px-2 py-1 rounded text-slate-400">Not Implemented</span>
            </button>
        </div>
    </div>
</div>
{{end}}
